name: Daily Job Hunt

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Nettoyage du cache APT
      - name: Clean APT cache
        run: sudo apt-get clean && sudo apt-get update

      # Installation des dépendances système (avec les deux alternatives pour libasound2)
      - name: Install Playwright system dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 liboss4-salsa-asound2

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create results directory
        run: mkdir -p results

      - name: Run job hunter
        env:
          WTTJ_EMAIL: ${{ secrets.WTTJ_EMAIL }}
          WTTJ_PASSWORD: ${{ secrets.WTTJ_PASSWORD }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python -u main.py 2>&1 | tee ../output.log || echo "Exit code: ${PIPESTATUS[0]}"

      - name: Display logs on failure
        if: failure()
        run: cat ../output.log

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-results
          path: |
            results/
            output.log