name: Daily Job Hunt

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Patch libasound2 for Ubuntu Noble
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libasound.so.2 /usr/lib/x86_64-linux-gnu/libasound.so.2.0.0 || true

      - name: Install Playwright + system dependencies
        run: |
          playwright install --with-deps chromium

      - name: Create results directory
        run: mkdir -p results

      - name: Run job hunter
        env:
          WTTJ_EMAIL: ${{ secrets.WTTJ_EMAIL }}
          WTTJ_PASSWORD: ${{ secrets.WTTJ_PASSWORD }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          cd src
          python -u main.py 2>&1 | tee ../output.log

      - name: Commit seen_jobs.db
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs.db
          git diff --staged --quiet || git commit -m "chore: update seen_jobs.db [skip ci]"
          git pull --rebase
          git push

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-results
          path: |
            results/
            output.log